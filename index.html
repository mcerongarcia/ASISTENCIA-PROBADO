<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Asistencia</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f1f5f9;
  transition: 0.3s;
}

.header {
  background: linear-gradient(90deg, #1e3a8a, #1d4ed8);
  color: white;
  text-align: center;
  padding: 12px;
}

.logo {
  width: 60px;
  display: block;
  margin: 0 auto 5px;
}

.nombre-liceo {
  font-size: 17px;
  font-weight: bold;
}

.sistema {
  font-size: 13px;
}

.botones {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px;
}

.botones button {
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #e2e8f0;
  font-weight: bold;
}

.activo {
  background: #1e3a8a;
  color: white;
}

#reader {
  width: 100%;
  max-width: 380px;
  margin: 10px auto;
  border-radius: 15px;
  border: 3px solid #1e3a8a;
  background: black;
}

#mensaje {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-top: 10px;
  padding: 10px;
}

.verde {
  background: #16a34a !important;
  color: white;
}

.rojo {
  background: #dc2626 !important;
  color: white;
}
</style>

</head>

<body>

<div class="header">
<img src="./logo.png.png" class="logo">
<div class="nombre-liceo">Liceo Luis Urbina Flores</div>
<div class="sistema">Sistema de Control de Asistencia</div>
</div>

<div class="botones">
<button onclick="setModo('entrada')" id="btnEntrada" class="activo">Entrada</button>
<button onclick="setModo('atraso')" id="btnAtraso">Atraso</button>
<button onclick="setModo('almuerzo')" id="btnAlmuerzo">Almuerzo</button>
<button onclick="setModo('convivencia')" id="btnConvivencia">Convivencia Escolar</button>
<button onclick="setModo('inspectoria')" id="btnInspectoria">Inspectoría General</button>
<button onclick="setModo('enfermeria')" id="btnEnfermeria">Enfermería</button>
</div>

<div id="reader"></div>
<div id="mensaje">Toca pantalla y escanea</div>

<script>

// 🔊 AUDIO GLOBAL (ARREGLA SONIDO EN CELULAR)
let audioCtx;

document.addEventListener("click", () => {
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}, { once:true });

function beep(freq = 800, duration = 150, volume = 0.3){
  if(!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration / 1000);
}

// VARIABLES
let modo = "entrada";
let bloqueado = false;
let ultimoQR = "";
let tiempoQR = 0;

// CAMBIAR MODO
function setModo(nuevo){
  modo = nuevo;
  document.querySelectorAll("button").forEach(b=>b.classList.remove("activo"));
  document.getElementById("btn"+capitalize(nuevo)).classList.add("activo");
}

function capitalize(t){
  return t.charAt(0).toUpperCase() + t.slice(1);
}

// 🔗 URL (NO TOCADO)
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyqe2E3NWr6apTEFWGOchcJNIx0zXbhirP7_3Ty7QGR2mr5z5Nuo0AZasJY5wfVCQZYAA/exec";

// 📲 ESCANEO (NO TOCADO)
function onScanSuccess(texto){

let ahora = Date.now();

if(texto === ultimoQR && (ahora - tiempoQR < 5000)){
  return;
}

ultimoQR = texto;
tiempoQR = ahora;

if(bloqueado) return;
bloqueado = true;

let mensaje = document.getElementById("mensaje");
let datos = texto.split("|");
let rut = (datos.length >= 5) ? datos[4] : texto;

fetch(URL_SCRIPT,{
  method:"POST",
  body: JSON.stringify({
    rut: rut,
    tipo: modo,
    hora: new Date().toLocaleTimeString(),
    fecha: new Date().toLocaleDateString()
  })
})
.then(res => res.text())
.then(respuesta => {

  if(respuesta.includes("ERROR")){
    document.body.classList.remove("verde");
    document.body.classList.add("rojo");
    mensaje.innerText = "❌ RUT NO REGISTRADO";
    beep(200, 300, 0.4);
  } else {
    document.body.classList.remove("rojo");
    document.body.classList.add("verde");
    mensaje.innerText = "✔ REGISTRADO";
    beep(800, 150, 0.3);
  }

})
.catch(() => {
  mensaje.innerText = "⚠ ERROR DE CONEXIÓN";
});

setTimeout(()=>{
  bloqueado = false;
  mensaje.innerText = "Esperando escaneo...";
  document.body.classList.remove("verde","rojo");
},2000);

}

// 📷 CAMARA (SOLO MEJORA VELOCIDAD)
const qr = new Html5Qrcode("reader");

qr.start(
  {facingMode:"environment"},
  {
    fps:12, // 🔥 MÁS RÁPIDO EN CELULAR
    qrbox:250
  },
  onScanSuccess
);

</script>

</body>
</html>
