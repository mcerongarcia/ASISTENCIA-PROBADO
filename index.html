<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Asistencia</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f1f5f9;
}

.header {
  background: linear-gradient(90deg, #1e3a8a, #1d4ed8);
  color: white;
  text-align: center;
  padding: 10px;
}

.logo {
  width: 60px;
  margin: 0 auto;
}

.botones {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 10px;
}

.botones button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #e2e8f0;
  font-weight: bold;
}

.activo {
  background: #1e3a8a;
  color: white;
}

#reader {
  width: 100%;
  max-width: 320px;
  margin: auto;
  border: 3px solid #1e3a8a;
}

#mensaje {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  padding: 10px;
}

.verde { background: #16a34a; color: white; }
.rojo { background: #dc2626; color: white; }
</style>
</head>

<body>

<div class="header">
<img src="./logo.png.png" class="logo">
<div>Liceo Luis Urbina Flores</div>
</div>

<div class="botones">
<button onclick="setModo('entrada')" id="btnEntrada" class="activo">Entrada</button>
<button onclick="setModo('atraso')" id="btnAtraso">Atraso</button>
<button onclick="setModo('almuerzo')" id="btnAlmuerzo">Almuerzo</button>
<button onclick="setModo('inspectoria')" id="btnInspectoria">Inspectoría</button>
</div>

<div id="reader"></div>
<div id="mensaje">Toca pantalla y escanea</div>

<script>

// 🔊 AUDIO GLOBAL (FUNCIONA EN CELULAR)
let audioCtx;

document.addEventListener("click", () => {
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}, { once:true });

function beep(freq=800){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.3;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

// VARIABLES
let modo = "entrada";
let bloqueado = false;
let ultimoQR = "";

// CAMBIAR MODO
function setModo(nuevo){
  modo = nuevo;
  document.querySelectorAll("button").forEach(b=>b.classList.remove("activo"));
  document.getElementById("btn"+nuevo.charAt(0).toUpperCase()+nuevo.slice(1)).classList.add("activo");
}

// 🔗 URL
const URL_SCRIPT = "PEGA_AQUI_TU_URL";

// ESCANEO
function onScanSuccess(texto){

if(texto === ultimoQR) return;
ultimoQR = texto;

if(bloqueado) return;
bloqueado = true;

let mensaje = document.getElementById("mensaje");
let datos = texto.split("|");
let rut = datos.length >=5 ? datos[4] : texto;

fetch(URL_SCRIPT,{
  method:"POST",
  body: JSON.stringify({
    rut:rut,
    tipo:modo,
    hora:new Date().toLocaleTimeString(),
    fecha:new Date().toLocaleDateString()
  })
})
.then(r=>r.text())
.then(res=>{

  if(res.includes("ERROR")){
    document.body.className="rojo";
    mensaje.innerText="❌ NO REGISTRADO";
    beep(200);
  }else{
    document.body.className="verde";
    mensaje.innerText="✔ REGISTRADO";
    beep(900);
  }

})
.catch(()=>{
  mensaje.innerText="⚠ ERROR";
});

// reset rápido
setTimeout(()=>{
  bloqueado=false;
  mensaje.innerText="Escanea siguiente";
  document.body.className="";
},1500);
}

// limpiar QR
setInterval(()=>{ ultimoQR=""; },2000);

// CAMARA (OPTIMIZADA 🚀)
const qr = new Html5Qrcode("reader");

qr.start(
  { facingMode:"environment" },
  { fps:10, qrbox:220 }, // 🔥 MÁS RÁPIDO
  onScanSuccess
);

</script>

</body>
</html>
